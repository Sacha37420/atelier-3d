server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        sub_filter '<base href="/">' '<base href="/atelier-3d/">';
        sub_filter_once on;
        # index.html référence les bundles JS/CSS par nom hashé (immutables, cf.
        # location ci-dessous) : lui-même ne doit JAMAIS être mis en cache, sinon
        # un navigateur peut continuer à charger un bundle obsolète indéfiniment.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /assets/env.js {
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* \.(js|css|woff2?|ttf|eot|svg|png|ico)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}
